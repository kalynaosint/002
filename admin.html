<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GSUA Admin</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="admin">
  <a class="skip-link" href="#main">跳转到主要内容</a>

  <header class="ua-header">
    <div class="globe-mark" aria-hidden="true">GS</div>
    <nav class="global-nav" aria-label="主导航">
      <a class="global-link" href="index.html">前线图档案</a>
      <a class="global-link active" href="admin.html">管理后台</a>
    </nav>
  </header>

  <main id="main" class="shell admin-shell">
    <section class="admin-toolbar">
      <a href="index.html">‹ 返回用户观看界面</a>
      <span class="badge">Local draft storage</span>
    </section>

    <section class="admin-layout">
      <form id="uploadForm" class="form-card">
        <div class="form-card-head">
          <h1>上传每日前线图</h1>
          <p>图片可以选择文件，也可以点击粘贴框后 Ctrl+V 直接粘贴。</p>
        </div>

        <label>
          前线方向
          <select id="adminDirection" required></select>
        </label>

        <label>
          日期
          <input id="adminDate" type="date" required />
        </label>

        <label>
          图片上传
          <input id="imageInput" type="file" accept="image/*" />
        </label>

        <div id="pasteBox" tabindex="0" class="paste-box">
          点击这里后 Ctrl+V 粘贴图片
        </div>

        <label>
          当日文字报告
          <textarea id="reportInput" rows="10" placeholder="输入当天报告。系统会自动识别方向名称和常见地名，并生成跳转链接。"></textarea>
        </label>

        <div class="button-row">
          <button class="primary-pill" type="submit">保存记录</button>
          <button class="outline-btn" type="button" id="exportBtn">导出 JSON</button>
          <button class="danger-btn" type="button" id="wipeBtn">清空本地数据</button>
        </div>
      </form>

      <aside class="form-card side-card">
        <div class="form-card-head">
          <h1>方向管理</h1>
          <p>以后方向发生变化时，可以在这里新增或删除。</p>
        </div>
        <div class="inline-form">
          <input id="newDirectionInput" type="text" placeholder="新增方向名称" />
          <button class="primary-pill small" id="addDirectionBtn" type="button">新增</button>
        </div>
        <ul id="directionManager" class="direction-manager"></ul>
      </aside>
    </section>
  </main>

  <dialog id="jsonDialog" class="json-dialog">
    <h2>导出数据</h2>
    <p>GitHub Pages 是静态网站。正式发布时，可以把这些 JSON 保存成仓库中的数据文件。</p>
    <textarea id="jsonOutput" rows="12"></textarea>
    <button class="primary-pill" id="closeDialogBtn">关闭</button>
  </dialog>

  <script src="script.js"></script>
</body>
</html>
