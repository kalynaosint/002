<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GSUA 前线图档案</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand-row">
      <a class="brand-link" href="index.html">GSUA Frontline Archive</a>
      <nav class="topnav" aria-label="主导航">
        <a class="nav-link active" href="#" data-tab="frontline">前线情况</a>
        <a class="nav-link" href="#" data-tab="combat">交战数据</a>
        <a class="nav-link" href="#" data-tab="losses">俄军损失</a>
      </nav>
    </div>
  </header>

  <main class="page-shell">

    <!-- ══ TAB: 前线情况 ══ -->
    <div id="tab-frontline" class="tab-content">
      <section class="control-band" aria-label="日期控制">
        <div class="date-control">
          <button class="blue-btn outline" id="prevDateBtn" type="button">‹ 上一个记录日</button>
          <div class="current-date-box">
            <span class="field-label">当前日期</span>
            <strong id="currentDateText">—</strong>
          </div>
          <button class="blue-btn outline" id="nextDateBtn" type="button">下一个记录日 ›</button>
          <button class="blue-btn" id="openCalendarBtn" type="button">打开日历</button>
        </div>
        <div id="overviewCalendarHost">
        <div class="calendar-popover hidden" id="calendarPopover" aria-label="日期日历">
          <div class="calendar-head">
            <button class="small-btn" id="calPrevMonth" type="button">‹</button>
            <strong id="calendarMonthLabel">—</strong>
            <button class="small-btn" id="calNextMonth" type="button">›</button>
          </div>
          <div class="calendar-weekdays">
            <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
          </div>
          <div class="calendar-grid" id="calendarGrid"></div>
        </div>
        </div>
      </section>

      <section class="viewer-grid">
        <aside class="side-panel">
          <h2>方向选择</h2>
          <div class="direction-list" id="viewerDirectionList"></div>
        </aside>

        <section class="main-panel">
          <div class="panel-title-row">
            <div>
              <h1 id="viewerTitle">最新前线总览</h1>
            </div>
            <div class="detail-action-row">
              <button class="plain-link-btn hidden" id="toggleChangesBtn" type="button">查看变化区域</button>
              <button class="plain-link-btn hidden" id="backToOverviewBtn" type="button">返回当天总览</button>
            </div>
          </div>

          <!-- Image overview grid -->
          <div class="overview-grid" id="overviewGrid"></div>

          <!-- Single-direction detail view -->
          <article class="detail-view hidden" id="detailView">
            <div class="image-frame large">
              <img id="detailImage" alt="方向前线图" />
              <div class="change-overlay hidden" id="detailChangeOverlay" aria-hidden="true"></div>
              <div class="empty-state" id="detailEmpty">当前日期缺少该方向图片</div>
              <div class="detail-date-overlay">
                <div class="date-control detail-date-control">
                  <button class="blue-btn outline" id="detailPrevDateBtn" type="button">‹ 上一个记录日</button>
                  <div class="current-date-box">
                    <span class="field-label">当前日期</span>
                    <strong id="detailCurrentDateText">—</strong>
                  </div>
                  <button class="blue-btn outline" id="detailNextDateBtn" type="button">下一个记录日 ›</button>
                  <button class="blue-btn" id="detailOpenCalendarBtn" type="button">打开日历</button>
                </div>
                <div id="detailCalendarHost"></div>
              </div>
            </div>
          </article>

          <!-- Collapsible report — below image grid, doesn't compress it -->
          <details class="report-collapse" id="reportCollapse">
            <summary class="report-collapse-toggle">
              <span class="report-kicker-inline">Daily Frontline Report</span>
              <span class="report-collapse-label">当日文字报告</span>
              <span class="report-collapse-chevron" aria-hidden="true">▼</span>
            </summary>
            <div class="report-body" id="reportBody">暂无报告。</div>
          </details>
        </section>
      </section>
    </div><!-- /tab-frontline -->

    <!-- ══ TAB: 交战数据 ══ -->
    <div id="tab-combat" class="tab-content hidden">
      <section class="viewer-grid">
        <aside class="side-panel">
          <h2>方向</h2>
          <div class="direction-list" id="combatDirectionList"></div>
        </aside>

        <section class="main-panel">
          <div class="panel-title-row">
            <div>
              <h1 id="combatChartTitle">交战数据</h1>
              <div class="chart-toolbar">
                <label class="toolbar-label">时间范围
                  <select class="text-input toolbar-select" id="combatRangeSelect">
                    <option value="30">30日</option>
                    <option value="60" selected>60日</option>
                    <option value="180">180日</option>
                    <option value="0">全部</option>
                  </select>
                </label>
                <label class="toolbar-label">移动均线
                  <select class="text-input toolbar-select" id="combatMASelect">
                    <option value="0">关闭</option>
                    <option value="3">3日均线</option>
                    <option value="7" selected>7日均线</option>
                    <option value="30">30日均线</option>
                  </select>
                </label>
              </div>
            </div>
            <button class="plain-link-btn hidden" id="combatBackBtn" type="button">返回总览</button>
          </div>
          <div class="chart-container">
            <canvas id="combatChart"></canvas>
          </div>
          <p class="hint-line" style="margin-top:10px">乌克兰武装部队总参谋部官方数据。</p>
        </section>
      </section>
    </div><!-- /tab-combat -->

    <!-- ══ TAB: 俄军损失 ══ -->
    <div id="tab-losses" class="tab-content hidden">
      <section class="viewer-grid">
        <aside class="side-panel">
          <h2>损失类别</h2>
          <div class="direction-list" id="lossCategoryList"></div>
        </aside>

        <section class="main-panel">
          <div class="panel-title-row">
            <div>
              <h1 id="lossChartTitle">俄军损失</h1>
              <div class="chart-toolbar">
                <label class="toolbar-label">时间范围
                  <select class="text-input toolbar-select" id="lossRangeSelect">
                    <option value="30">30日</option>
                    <option value="60" selected>60日</option>
                    <option value="180">180日</option>
                    <option value="0">全部</option>
                  </select>
                </label>
                <label class="toolbar-label">移动均线
                  <select class="text-input toolbar-select" id="lossMASelect">
                    <option value="0">关闭</option>
                    <option value="3">3日均线</option>
                    <option value="7" selected>7日均线</option>
                    <option value="30">30日均线</option>
                  </select>
                </label>
              </div>
            </div>
            <button class="plain-link-btn hidden" id="lossBackBtn" type="button">返回总览</button>
          </div>
          <div class="chart-container">
            <canvas id="lossChart"></canvas>
          </div>
          <p class="hint-line" style="margin-top:10px">乌克兰武装部队总参谋部官方数据。</p>
        </section>
      </section>
    </div><!-- /tab-losses -->

  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
